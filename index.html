  let sortOrder = null; // null, 'desc', 'asc'

  function getNotaColor(nota) {
    if (nota >= 0) return { bg: 'bg-green-50', text: 'text-green-700', border: 'border-green-200' };
    return { bg: 'bg-red-50', text: 'text-red-700', border: 'border-red-200' };
  }

  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    data.forEach((item, i) => {
      const c = getNotaColor(item.nota);
      const tr = document.createElement('tr');
      tr.className = `row-animate border-b border-slate-100 hover:bg-slate-50 ${i % 2 === 0 ? '' : 'bg-slate-50/40'}`;
      tr.style.animationDelay = `${i * 0.02}s`;
      tr.innerHTML = `
        <td class="px-4 py-3 text-slate-400 font-mono text-xs">${i + 1}</td>
        <td class="px-4 py-3 font-semibold text-slate-800">${item.campus}</td>
        <td class="px-4 py-3 font-semibold text-slate-800">${item.curso}</td>
        <td class="px-4 py-3 text-slate-500">${item.turno}</td>
        <td class="px-4 py-3 text-right">
          <span class="badge ${c.bg} ${c.text} border ${c.border}">${item.nota.toFixed(3)}</span>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function toggleSort() {
    const indicator = document.getElementById('sortIndicator');
    let sorted;

    if (sortOrder === null || sortOrder === 'asc') {
      sortOrder = 'desc';
      sorted = [...dados].sort((a, b) => b.nota - a.nota);
      indicator.textContent = '▼ Maior para menor';
    } else {
      sortOrder = 'asc';
      sorted = [...dados].sort((a, b) => a.nota - b.nota);
      indicator.textContent = '▲ Menor para maior';
    }

    renderTable(sorted);
  }

  // Initial render (original order)
